secure:
  required_reviews: 1
  codeowners_enabled: true
  # NOTE: Codeflow does not support glob patterns; long-lived support branches
  # must be enumerated explicitly. When cutting a new LTS (`release-N.x`) or pre-release branch add it here
  branches:
    - master
    - release-8.x
    - cds-v9-master
  auto_assign_reviewers: true
  # Marks
  upstream_repository: coinbase/cds
build:
  engines:
    # Apps
    # Deployed from internal mirror repo (cds-public)
    # Sync job automatically runs every 1-2 hours
    - BaldurECR:
        name: cds-next-docs
        path: ./apps/docs/production.Dockerfile
        autobuild: true
    - BaldurECR:
        name: cds-docs-dev
        path: ./apps/docs/development.Dockerfile
        autobuild: false
    - BaldurECR:
        name: cds-storybook
        path: ./apps/storybook/production.Dockerfile
        autobuild: true
    - BaldurECR:
        name: cds-storybook-dev
        path: ./apps/storybook/development.Dockerfile
        autobuild: false
    # Static assets
    # Deployed from internal mirror repo (cds-public)
    # Sync job automatically runs every 1-2 hours
    - BaldurECR:
        name: static-assets
        path: ./libs/static-assets/static-assets.Dockerfile
        autobuild_files:
          - packages/illustrations/package.json
    # Packages
    # Deployed from internally maintained repo (cds-internal)
    # Commits from this repo (coinbase/cds) are manually synced (see cds-repo-sync.mjs in frontend/cds) to this repo
    # where they are deployed by Codeflow
    - BaldurNode:
        name: package-common
        path: ./packages/common/publish.Dockerfile
        architecture: amd64
        autobuild_files:
          - packages/common/package.json
        expire_keep_tags_after_days: 1
        expire_tmp_tags_after_days: 1
        expire_all_after_days: 2
    - BaldurNode:
        name: package-eslint-plugin-cds
        path: ./packages/eslint-plugin-cds/publish.Dockerfile
        architecture: amd64
        autobuild_files:
          - packages/eslint-plugin-cds/package.json
        expire_keep_tags_after_days: 1
        expire_tmp_tags_after_days: 1
        expire_all_after_days: 2
    - BaldurNode:
        name: package-icons
        path: ./packages/icons/publish.Dockerfile
        architecture: amd64
        autobuild_files:
